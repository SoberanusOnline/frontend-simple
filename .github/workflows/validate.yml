name: Validate plugin
on:
  push:
    branches: [main]
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Validate manifests (JSON well-formed + campos obrigatorios)
        run: |
          node -e '
            const fs=require("fs");
            const mp=JSON.parse(fs.readFileSync(".claude-plugin/marketplace.json","utf8"));
            if(!mp.name||!mp.owner||!Array.isArray(mp.plugins)||!mp.plugins.length) throw new Error("marketplace.json invalido");
            for(const p of mp.plugins){
              const pj=JSON.parse(fs.readFileSync(p.source.replace(/^\.\//,"")+"/.claude-plugin/plugin.json","utf8"));
              if(!pj.name||!pj.description) throw new Error("plugin.json invalido: "+p.name);
              console.log("ok:",pj.name,pj.version||"(rolling)");
            }'
      - name: Skills tem SKILL.md com frontmatter
        run: |
          set -e
          for f in plugins/*/skills/*/; do
            test -f "$f/SKILL.md" || { echo "FALTA SKILL.md em $f"; exit 1; }
            head -1 "$f/SKILL.md" | grep -q '^---$' || { echo "SEM frontmatter: $f"; exit 1; }
            echo "ok: $f"
          done
      - name: Sem travessao no conteudo das skills
        run: |
          if grep -rn $'—\|–' plugins/*/skills --include='*.md' | grep -v '^Binary'; then
            echo "Travessao encontrado (proibido pelo proprio padrao)"; exit 1
          fi
          echo "limpo"
